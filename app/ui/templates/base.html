<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}监控页面{% endblock %}</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #d9e8ff;
            --panel: rgba(255, 255, 255, 0.78);
            --panel-strong: rgba(255, 255, 255, 0.86);
            --line: rgba(16, 34, 66, 0.12);
            --text: #10213d;
            --muted: #4f6489;
            --ring: rgba(0, 122, 255, 0.24);
            --shadow-window: 0 0 1px rgba(0, 0, 0, 0.32), 0 18px 36px -10px rgba(7, 24, 58, 0.24);
            --shadow-panel: 0 12px 28px -16px rgba(7, 24, 58, 0.28);
            --primary-top: #3f9bff;
            --primary-bottom: #1167d8;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d111a;
                --panel: rgba(24, 31, 45, 0.74);
                --panel-strong: rgba(29, 37, 53, 0.84);
                --line: rgba(255, 255, 255, 0.12);
                --text: #e8edf7;
                --muted: #9aabc9;
                --shadow-window: 0 0 1px rgba(255, 255, 255, 0.16), 0 20px 40px -10px rgba(0, 0, 0, 0.45);
                --shadow-panel: 0 12px 28px -14px rgba(0, 0, 0, 0.58);
            }
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            padding: 20px 16px 26px;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--text);
            background: radial-gradient(circle at 16% 8%, #ffffff70 0 20%, transparent 55%),
                        radial-gradient(circle at 86% 12%, #4f86ff4a 0 16%, transparent 44%),
                        radial-gradient(circle at 78% 80%, #53d1f24a 0 13%, transparent 38%),
                        linear-gradient(140deg, var(--bg), #cfe0ff);
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.015;
            background-image:
                repeating-radial-gradient(circle at 25% 35%, #000 0 0.35px, transparent 0.35px 2.8px),
                repeating-radial-gradient(circle at 80% 70%, #000 0 0.35px, transparent 0.35px 2.9px);
            z-index: 0;
        }
        .shell {
            position: relative;
            z-index: 1;
            width: min(1320px, 100%);
            margin: 0 auto;
        }
        .glass {
            backdrop-filter: blur(22px) saturate(160%);
            -webkit-backdrop-filter: blur(22px) saturate(160%);
            border: 0.5px solid var(--line);
            border-radius: 16px;
            background: var(--panel);
            box-shadow: var(--shadow-window), inset 0 1px 0 rgba(255, 255, 255, 0.42);
        }
        .topbar {
            margin-bottom: 16px;
            padding: 13px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .traffic {
            display: inline-flex;
            gap: 8px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 0 0 0.5px rgba(0, 0, 0, 0.24);
        }
        .dot.red { background: linear-gradient(180deg, #ff7d7b, #f24747); }
        .dot.yellow { background: linear-gradient(180deg, #ffd874, #f2ae2f); }
        .dot.green { background: linear-gradient(180deg, #65e28d, #28b967); }
        .title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .subtitle {
            margin: 2px 0 0;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }
        .version-chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 0.5px solid var(--line);
            background: var(--panel-strong);
            color: var(--muted);
            padding: 5px 10px;
            font-size: 12px;
            letter-spacing: 0.04em;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        .panel {
            backdrop-filter: blur(18px) saturate(155%);
            -webkit-backdrop-filter: blur(18px) saturate(155%);
            border: 0.5px solid var(--line);
            border-radius: 16px;
            background: var(--panel-strong);
            box-shadow: var(--shadow-panel), inset 0 1px 0 rgba(255, 255, 255, 0.42);
            padding: 16px 18px;
            margin-bottom: 14px;
        }
        .panel h2 {
            margin: 0 0 8px;
            font-size: 20px;
            letter-spacing: -0.02em;
        }
        .muted {
            color: var(--muted);
            font-size: 13px;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        input, button, .btn {
            border-radius: 10px;
            font: inherit;
        }
        input {
            border: 0.5px solid var(--line);
            padding: 9px 10px;
            background: rgba(255, 255, 255, 0.76);
            color: inherit;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.06);
        }
        @media (prefers-color-scheme: dark) {
            input { background: rgba(255, 255, 255, 0.08); }
        }
        input:focus {
            outline: none;
            border-color: rgba(0, 122, 255, 0.42);
            box-shadow: 0 0 0 4px var(--ring), inset 0 1px 2px rgba(0, 0, 0, 0.06);
        }
        .btn, button {
            border: 0.5px solid rgba(255, 255, 255, 0.35);
            padding: 8px 12px;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(180deg, var(--primary-top), var(--primary-bottom));
            box-shadow: 0 6px 14px -8px rgba(16, 103, 216, 0.72), inset 0 0.5px 0 rgba(255, 255, 255, 0.28);
            transition: transform 0.2s ease-out, filter 0.2s ease-out;
        }
        .btn:hover, button:hover { filter: brightness(1.05); }
        .btn:active, button:active { transform: scale(0.96); }
        .table-wrap {
            overflow: auto;
            border-radius: 12px;
            border: 0.5px solid var(--line);
            background: rgba(255, 255, 255, 0.44);
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 960px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 0.5px solid var(--line);
            vertical-align: top;
            font-size: 13px;
        }
        th {
            background: rgba(255, 255, 255, 0.88);
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.04em;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        @media (prefers-color-scheme: dark) {
            th { background: rgba(23, 30, 43, 0.92); }
        }
        tbody tr:nth-child(even) { background: rgba(12, 33, 79, 0.04); }
        .ok { color: #12895f; }
        .bad { color: #c43850; }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px;
        }
        .meta-item {
            border-radius: 12px;
            padding: 10px 12px;
            border: 0.5px solid var(--line);
            background: rgba(255, 255, 255, 0.48);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.36);
            font-size: 13px;
        }
        .reveal {
            opacity: 0;
            transform: translateY(8px);
            animation: fade-up 420ms cubic-bezier(.22,.68,.2,1) forwards;
        }
        @keyframes fade-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 900px) {
            body { padding: 14px 10px 20px; }
            .topbar { padding: 12px; }
            .panel { padding: 13px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<div class="shell">
    <header class="topbar glass reveal">
        <div class="brand">
            <div class="traffic" aria-hidden="true">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div>
                <h1 class="title">余额监控看板</h1>
                <p class="subtitle">macOS inspired monitoring view</p>
            </div>
        </div>
        <div class="toolbar">
            <span class="version-chip">v{{ app_version }}</span>
            <a class="btn" href="/ui">普通用户首页</a>
            <a class="btn" href="/ui/sources">监控列表</a>
            <a class="btn" href="/ui/key-search">Key片段查询</a>
        </div>
    </header>
    {% block content %}{% endblock %}
</div>
<script>
document.querySelectorAll(".reveal").forEach((node, index) => {
  node.style.animationDelay = `${Math.min(index * 70, 280)}ms`;
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
