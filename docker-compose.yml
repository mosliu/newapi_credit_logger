services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newapi-credit-logger
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/newapi_credit_logger.db}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port=os.getenv('APP_PORT','8000'); urllib.request.urlopen('http://127.0.0.1:%s/api/health' % port).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.4
    container_name: newapi-credit-logger-mysql
    profiles: ["mysql"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: newapi_credit_logger
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16
    container_name: newapi-credit-logger-postgres
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: newapi_credit_logger
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mysql_data:
  postgres_data:
